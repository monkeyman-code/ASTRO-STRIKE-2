<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AstroStrike :: 8-BIT TERMINAL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            /* 8-BIT PALETTE (Strict, non-gradient colors) */
            --blue: #00ffff;  /* Cyan */
            --red: #ff0000;   /* Pure Red */
            --gold: #ffcc00;  /* Pure Gold */
            --purple: #ff00ff; /* Pure Magenta */
            --bg: #000000;    /* Pure Black */
            --star: #ffffff;  /* Pure White */
        }

        body { 
            margin: 0; overflow: hidden; background: var(--bg); color: var(--blue); 
            /* Pixel Font */
            font-family: 'Press Start 2P', cursive; user-select: none;
            touch-action: none; font-size: 8px; /* Base 8-bit size */
            image-rendering: pixelated; /* Crucial for that sharp pixel look */
        }
        
        #game-board { 
            position: relative; width: 100vw; height: 100vh; display: none; 
            /* Remove smooth radial gradient, use solid black */
            background: var(--bg); overflow: hidden;
        }

        /* Blocky Stars */
        .star { position: absolute; background: var(--star); border-radius: 0; opacity: 1; animation: moveStars linear infinite; }
        @keyframes moveStars { from { transform: translateY(-100vh); } to { transform: translateY(100vh); } }

        .overlay { 
            position: absolute; top:0; left:0; width:100vw; height:100vh; 
            display:flex; flex-direction:column; align-items:center; justify-content:center; 
            /* Solid black overlay, no blur */
            background: var(--bg); z-index: 100; text-align: center;
        }
        
        #main-menu, #pause-menu, #game-over-menu { display: none; }

        h1 { font-size: 16px; letter-spacing: 2px; color: var(--purple); margin-bottom: 20px; font-weight: normal; }
        h2 { color: var(--gold); letter-spacing: 1px; font-size: 8px; margin-bottom: 30px; }

        .menu-row { display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 8px; flex-wrap: wrap; max-width: 95vw; margin-top: 15px; }

        /* Blocky Buttons */
        .btn { 
            background: transparent; border: 1px solid var(--blue); color: var(--blue); 
            padding: 8px 4px; font-size: 8px; cursor: pointer; width: 90px; 
            text-transform: uppercase; font-family: 'Press Start 2P', cursive; transition: 0.1s; border-radius: 0; 
        }
        .btn:hover:not(:disabled) { background: var(--blue); color: var(--bg); box-shadow: none; }
        .btn:disabled { opacity: 0.3; cursor: wait; }

        input[type="text"] {
            background: transparent; border: 1px solid var(--purple); color: var(--star);
            padding: 10px; font-size: 10px; text-align: center; border-radius: 0; width: 80vw; max-width: 300px; outline: none; font-family: 'Press Start 2P', cursive;
        }

        /* Blocky Definition Box */
        #def-box {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            width: 90vw; max-width: 500px; background: var(--bg); border: 1px solid var(--purple);
            padding: 8px; border-radius: 0; text-align: center; font-size: 7px; 
            color: var(--blue); box-shadow: none; z-index: 70;
            pointer-events: none; opacity: 0; transition: opacity 0.3s; line-height: 1.4;
        }

        /* Blocky HUD */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; box-sizing: border-box; z-index: 50; background: var(--bg); border-bottom: 1px solid var(--purple); }
        .stat-box { font-size: 7px; text-transform: uppercase; color: var(--blue); }
        .stat-val { color: var(--star); margin-left: 3px; }

        /* Blocky Turret */
        #turret { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); width: 20px; height: 30px; background: var(--purple); clip-path: polygon(50% 0%, 0% 100%, 100% 100%); box-shadow: none; }
        #turret::after { content: ''; position: absolute; top: -10px; left: 7px; width: 6px; height: 10px; background: var(--purple); }

        /* Blocky Word & Letters */
        .word { position: absolute; font-size: 14px; color: var(--star); text-shadow: none; white-space: nowrap; display: flex; pointer-events: none; }
        .letter { transition: all 0.05s; opacity: 1; }
        .letter.active-target { color: var(--red); transform: none; opacity: 1; }
        .letter.typed { opacity: 0.3; }
        
        /* Blocky Missile */
        .missile { position: absolute; width: 4px; height: 15px; background: var(--star); box-shadow: none; border-radius: 0; z-index: 5; transition: all 0.12s linear; }

        /* Blocky Mobile Keyboard */
        #mobile-keyboard { display: none; position: absolute; bottom: 10px; left: 0; width: 100vw; flex-direction: column; gap: 4px; align-items: center; z-index: 60; }
        .kb-row { display: flex; gap: 4px; justify-content: center; width: 100%; }
        .kb-key { background: transparent; border: 1px solid var(--purple); color: var(--star); padding: 8px 0; width: 8.5vw; max-width: 40px; text-align: center; border-radius: 0; font-size: 8px; cursor: pointer; font-family: 'Press Start 2P', cursive; }
        .kb-key:active { background: var(--purple); color: var(--bg); }

        @media (max-width: 768px) {
            #mobile-keyboard { display: flex; }
            #turret { bottom: 200px; }
            #def-box { bottom: 350px; font-size: 6.5px; }
        }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay" style="display: flex;">
        <h1 id="welcome-msg">ASTRO STRIKE</h1>
        <h2>SELECT SYSTEM LOADOUT</h2>
        <div class="menu-row">
            <button class="btn" onclick="game.start('easy')" disabled>Easy</button>
            <button class="btn" onclick="game.start('normal')" disabled>Normal</button>
            <button class="btn" onclick="game.start('hard')" disabled>Hard</button>
            <button class="btn" onclick="game.start('expert')" disabled>Expert</button>
            <button class="btn" style="border-color:var(--red); color:var(--red)" onclick="game.start('master')" disabled>Master</button>
            <button class="btn" style="border-color:var(--gold); color:var(--gold); width: 110px;" onclick="game.start('god')" disabled>GOD MODE</button>
        </div>
    </div>

    <div id="game-board">
        <div id="hud">
            <div class="stat-box">MODE:<span class="stat-val" id="hud-mode">---</span></div>
            <div class="stat-box">SCR:<span class="stat-val" id="score">0</span></div>
            <div class="stat-box">HUL:<span class="stat-val" id="lives">3</span></div>
            <button class="btn" style="width: 50px; height: 25px; padding: 0; font-size: 6px;" onclick="game.togglePause()">PAUSE</button>
        </div>
        <div id="def-box">DATA SCANNING...</div>
        <div id="turret"></div>
        <div id="mobile-keyboard"></div>
    </div>

    <div id="pause-menu" class="overlay">
        <h1>PAUSED</h1>
        <button class="btn" onclick="game.togglePause()">Resume</button>
        <button class="btn" style="margin-top:10px; color:var(--red); border-color:var(--red)" onclick="game.quit()">Quit</button>
    </div>

    <div id="game-over-menu" class="overlay">
        <h1 style="color:var(--red)">TERMINATED</h1>
        <div id="final-stats" style="margin-bottom:20px; font-size: 12px;"></div>
        <button class="btn" onclick="game.quit()">Retry</button>
    </div>

    <script>
        const DICT_URL = "https://cdn.jsdelivr.net/gh/dwyl/english-words@master/words_alpha.txt";

        window.game = {
            active: false, paused: false, score: 0, lives: 3,
            currentWord: null, difficulty: 'normal',
            megaDict: { easy: [], normal: [], hard: [], expert: [], master: [], god: [] },
            speeds: { easy: 0.6, normal: 1.0, hard: 1.6, expert: 2.4, master: 3.2, god: 4.5 },

            audio: {
                ctx: null,
                init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
                play(f1, f2, d, v, type='square') {
                    if(!this.ctx) return;
                    const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
                    o.type = type; o.connect(g); g.connect(this.ctx.destination);
                    o.frequency.setValueAtTime(f1, this.ctx.currentTime);
                    o.frequency.exponentialRampToValueAtTime(f2, this.ctx.currentTime + d);
                    g.gain.setValueAtTime(v, this.ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + d);
                    o.start(); o.stop(this.ctx.currentTime + d);
                }
            },

            async init() {
                this.buildKB();
                // Spawn 8-bit blocky stars
                for(let i=0; i<30; i++) {
                    let s = document.createElement('div'); s.className = 'star';
                    // Make stars square
                    const size = Math.random()*2+1+'px';
                    s.style.width = size; s.style.height = size;
                    s.style.left = Math.random()*100+'vw'; s.style.top = Math.random()*100+'vh';
                    s.style.animationDuration = (Math.random()*4+2)+'s';
                    document.getElementById('game-board').appendChild(s);
                }
                
                try {
                    const r = await fetch(DICT_URL); const t = await r.text();
                    t.split('\n').forEach(w => {
                        const word = w.trim().toUpperCase();
                        if(word.length >=3 && word.length <=4) this.megaDict.easy.push(word);
                        else if(word.length >=5 && word.length <=6) this.megaDict.normal.push(word);
                        else if(word.length >=7 && word.length <=9) this.megaDict.hard.push(word);
                        else if(word.length >=10 && word.length <=12) this.megaDict.expert.push(word);
                        else if(word.length >=13 && word.length <=15) this.megaDict.master.push(word);
                        else if(word.length > 15) this.megaDict.god.push(word);
                    });
                    document.querySelectorAll('.btn').forEach(b => b.disabled = false);
                } catch(e) { this.megaDict.easy = ["STAR","VOID"]; document.querySelectorAll('.btn').forEach(b => b.disabled = false); }
            },

            buildKB() {
                const layout = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];
                const kb = document.getElementById('mobile-keyboard');
                layout.forEach(row => {
                    const rDiv = document.createElement('div'); rDiv.className = 'kb-row';
                    row.split('').forEach(k => {
                        const b = document.createElement('div'); b.className = 'kb-key'; b.innerText = k;
                        b.addEventListener('pointerdown', (e) => { e.preventDefault(); this.handleInput(k); });
                        rDiv.appendChild(b);
                    });
                    kb.appendChild(rDiv);
                });
            },

            async fetchDef(word) {
                const box = document.getElementById('def-box');
                box.style.opacity = "0";
                try {
                    const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word.toLowerCase()}`);
                    const data = await response.json();
                    if (data[0] && data[0].meanings[0]) {
                        const def = data[0].meanings[0].definitions[0].definition;
                        box.innerText = `${word}: ${def}`;
                        box.style.opacity = "1";
                    } else { box.innerText = `[${word}] DATA UNAVAILABLE`; box.style.opacity = "0.5"; }
                } catch(e) { box.innerText = `[${word}] SCANNING...`; box.style.opacity = "0.3"; }
            },

            start(d) {
                this.audio.init(); this.difficulty = d; this.active = true; this.paused = false;
                this.score = 0; this.lives = (d === 'god') ? 2 : 3;
                document.getElementById('main-menu').style.display = 'none';
                document.getElementById('game-over-menu').style.display = 'none';
                document.getElementById('game-board').style.display = 'block';
                document.getElementById('hud-mode').innerText = d.toUpperCase();
                this.updateUI(); this.spawn(); this.loop();
            },

            spawn() {
                if(!this.active) return;
                if(this.currentWord) this.currentWord.el.remove();
                const pool = this.megaDict[this.difficulty];
                const text = pool[Math.floor(Math.random()*pool.length)];
                this.fetchDef(text);
                const el = document.createElement('div'); el.className = 'word';
                // Adjust spacing for pixel font
                const charW = window.innerWidth < 768 ? 12 : 16;
                const maxL = window.innerWidth - (text.length * charW) - 20;
                el.style.left = Math.max(10, Math.random()*maxL)+'px'; el.style.top = '-40px';
                
                // Color god mode words in pure gold
                if(this.difficulty === 'god') { el.style.color = 'var(--gold)'; }
                
                const letters = text.split('').map((c, i) => {
                    const s = document.createElement('span'); s.innerText = c; s.className = 'letter';
                    if(i===0) s.classList.add('active-target'); 
                    el.appendChild(s); return s;
                });
                document.getElementById('game-board').appendChild(el);
                this.currentWord = { el, text, letters, y: -40, index: 0 };
            },

            loop() {
                if(!this.active || this.paused) return;
                if(this.currentWord) {
                    this.currentWord.y += this.speeds[this.difficulty];
                    this.currentWord.el.style.top = this.currentWord.y + 'px';
                    const limit = window.innerWidth < 768 ? window.innerHeight - 300 : window.innerHeight - 100;
                    if(this.currentWord.y > limit) {
                        const damage = (this.difficulty === 'god') ? 2 : 1;
                        this.lives -= damage; 
                        this.audio.play(100, 50, 0.2, 0.1, 'sawtooth'); this.updateUI();
                        if(this.lives <= 0) this.gameOver(); else this.spawn();
                    }
                }
                requestAnimationFrame(() => this.loop());
            },

            handleInput(key) {
                if(!this.active || this.paused || !this.currentWord) return;
                const w = this.currentWord;
                if(key === w.text[w.index]) {
                    this.fire(w.letters[w.index]);
                    w.letters[w.index].classList.remove('active-target');
                    w.letters[w.index].classList.add('typed');
                    w.index++;
                    if(w.index < w.text.length) {
                        w.letters[w.index].classList.add('active-target');
                    } else {
                        const multiplier = (this.difficulty === 'god') ? 50 : 10;
                        this.score += (w.text.length * multiplier);
                        this.audio.play(150, 10, 0.4, 0.1, 'sawtooth');
                        this.updateUI(); this.spawn();
                    }
                } else { this.audio.play(60, 40, 0.1, 0.05, 'triangle'); }
            },

            fire(target) {
                this.audio.play(800, 200, 0.1, 0.03);
                const m = document.createElement('div'); m.className = 'missile';
                const r = target.getBoundingClientRect();
                // Blocky missile starting point
                m.style.left = "50vw"; m.style.bottom = window.innerWidth < 768 ? "210px" : "40px";
                document.getElementById('game-board').appendChild(m);
                setTimeout(() => { m.style.left = (r.left)+'px'; m.style.top = (r.top)+'px'; }, 10);
                setTimeout(() => m.remove(), 120);
            },

            updateUI() {
                document.getElementById('score').innerText = this.score;
                document.getElementById('lives').innerText = Math.max(0, this.lives);
            },

            gameOver() {
                this.active = false;
                document.getElementById('def-box').style.opacity = "0";
                document.getElementById('final-stats').innerText = `TOTAL KNOWLEDGE: ${this.score}`;
                document.getElementById('game-over-menu').style.display = 'flex';
            },

            togglePause() { 
                this.paused = !this.paused; 
                document.getElementById('pause-menu').style.display = this.paused ? 'flex' : 'none';
                if(!this.paused) this.loop();
            },

            quit() { location.reload(); }
        };

        window.addEventListener('keydown', (e) => {
            if(e.repeat || e.ctrlKey || e.altKey) return;
            if(e.key === "Escape") window.game.togglePause();
            if(window.game.active && !window.game.paused && /^[a-zA-Z]$/.test(e.key)) window.game.handleInput(e.key.toUpperCase());
        });

        window.game.init();
    </script>
</body>
</html>
